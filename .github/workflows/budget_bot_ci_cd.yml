name: Deploy Budget Bot

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-budget-bot-production
  cancel-in-progress: true

jobs:
  verify:
    name: Verify Project
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Validate backend modules
        run: python -m py_compile backend/app/config.py backend/app/main.py backend/app/dependencies.py

      - name: Validate docker compose
        run: docker compose -f infra/docker-compose.yml config

  deploy:
    name: Deploy To Server
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - name: Execute remote deployment
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT || '22' }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -eu

            DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            REPO_SSH_URL="${{ secrets.REPO_SSH_URL }}"
            DEPLOY_BRANCH="${{ github.ref_name }}"

            if [ -z "$DEPLOY_PATH" ] || [ "$DEPLOY_PATH" = "/" ]; then
              echo "DEPLOY_PATH is not configured safely"
              exit 1
            fi

            if [ -z "$REPO_SSH_URL" ]; then
              echo "REPO_SSH_URL is not configured"
              exit 1
            fi

            mkdir -p "$(dirname "$DEPLOY_PATH")"

            if [ ! -d "$DEPLOY_PATH/.git" ]; then
              rm -rf "$DEPLOY_PATH"
              git clone "$REPO_SSH_URL" "$DEPLOY_PATH"
            fi

            cd "$DEPLOY_PATH"
            git fetch origin "$DEPLOY_BRANCH"
            git checkout -B "$DEPLOY_BRANCH" "origin/$DEPLOY_BRANCH"
            git pull --ff-only origin "$DEPLOY_BRANCH"

            cat > infra/.env <<EOF
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            DB_DATABASE=${{ secrets.DB_DATABASE }}
            DB_SCHEMA=${{ secrets.DB_SCHEMA }}
            APP_HOST=0.0.0.0
            APP_PORT=8000
            FRONTEND_ORIGINS=${{ secrets.FRONTEND_ORIGINS }}
            TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
            TELEGRAM_INIT_DATA_TTL_SECONDS=${{ secrets.TELEGRAM_INIT_DATA_TTL_SECONDS || '86400' }}
            DB_HOST=db
            DB_PORT=5432
            EOF

            docker compose -f infra/docker-compose.yml --env-file infra/.env up -d --build --remove-orphans
            docker image prune -f
